name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ldap, curl, mbstring, json, xml, zip

      - name: PHP syntax check
        run: find . -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Security smell check
        run: |
          ! grep -RInE '(^|[^[:alnum:]_])(eval|shell_exec|system|passthru|exec|base64_decode|unserialize)[[:space:]]*\(' lib templates appinfo || exit 1
